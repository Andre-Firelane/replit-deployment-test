<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks – Mini CRUD</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 0.25rem;
      color: #1a1a2e;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    /* Form Card */
    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #374151;
    }

    input[type="text"], textarea, select {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 0.75rem;
      font-family: inherit;
      background: white;
    }

    input[type="text"]:focus, textarea:focus, select:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }

    textarea { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }
    .btn:hover { opacity: 0.88; }

    .btn-primary { background: #6366f1; color: white; }
    .btn-success { background: #10b981; color: white; }
    .btn-danger  { background: #ef4444; color: white; font-size: 0.8rem; padding: 0.4rem 0.8rem; }
    .btn-ghost   { background: #f3f4f6; color: #374151; font-size: 0.8rem; padding: 0.4rem 0.8rem; }

    /* Task List */
    #task-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .task-item {
      background: white;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      transition: box-shadow 0.2s;
      border-left: 4px solid transparent;
    }

    .task-item:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .task-item.done .task-title { text-decoration: line-through; color: #9ca3af; }

    .task-item.priority-high   { border-left-color: #ef4444; }
    .task-item.priority-medium { border-left-color: #f59e0b; }
    .task-item.priority-low    { border-left-color: #10b981; }

    .task-checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #6366f1;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .task-body { flex: 1; }
    .task-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.2rem; }
    .task-desc  { font-size: 0.82rem; color: #6b7280; margin-bottom: 0.5rem; }

    .task-meta {
      font-size: 0.75rem;
      color: #9ca3af;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.15rem 0.55rem;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-open   { background: #ede9fe; color: #7c3aed; }
    .badge-done   { background: #d1fae5; color: #065f46; }
    .badge-high   { background: #fee2e2; color: #991b1b; }
    .badge-medium { background: #fef3c7; color: #92400e; }
    .badge-low    { background: #d1fae5; color: #065f46; }

    .task-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }

    /* Edit modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 14px;
      padding: 1.8rem;
      width: 90%;
      max-width: 440px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .modal h2 { margin-bottom: 1.2rem; font-size: 1.1rem; }
    .modal-footer { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem; }

    /* States */
    .empty-state {
      text-align: center;
      color: #9ca3af;
      padding: 2.5rem 1rem;
      font-size: 0.95rem;
    }

    #status-msg {
      text-align: center;
      font-size: 0.82rem;
      color: #6b7280;
      margin-bottom: 1rem;
      min-height: 1.2em;
    }

    .error { color: #ef4444 !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 Tasks</h1>
    <p class="subtitle">Mini CRUD – Supabase + Replit Demo</p>

    <!-- Add Task Form -->
    <div class="card">
      <h2>Neue Aufgabe</h2>
      <input type="text" id="new-title" placeholder="Titel *" />
      <textarea id="new-desc" placeholder="Beschreibung (optional)"></textarea>
      <select id="new-priority">
        <option value="low">🟢 Niedrig</option>
        <option value="medium" selected>🟡 Mittel</option>
        <option value="high">🔴 Hoch</option>
      </select>
      <button class="btn btn-primary" onclick="createTask()">+ Aufgabe hinzufügen</button>
    </div>

    <!-- Status -->
    <div id="status-msg">Verbinde mit Supabase...</div>

    <!-- Task List -->
    <div id="task-list"></div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <h2>✏️ Aufgabe bearbeiten</h2>
      <input type="text" id="edit-title" placeholder="Titel *" />
      <textarea id="edit-desc" placeholder="Beschreibung"></textarea>
      <select id="edit-priority">
        <option value="low">🟢 Niedrig</option>
        <option value="medium">🟡 Mittel</option>
        <option value="high">🔴 Hoch</option>
      </select>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
        <button class="btn btn-success" onclick="saveEdit()">Speichern</button>
      </div>
    </div>
  </div>

  <script>
    let db;
    let editingId = null;

    // ── Init: Supabase config from server ────────────────────────────────────
    async function init() {
      try {
        const res = await fetch('/config');
        const { supabaseUrl, supabaseKey } = await res.json();

        if (!supabaseUrl || !supabaseKey) {
          setStatus('⚠️ Supabase-Konfiguration fehlt. Bitte .env prüfen.', true);
          return;
        }

        db = window.supabase.createClient(supabaseUrl, supabaseKey);
        setStatus('');
        await loadTasks();
      } catch (e) {
        setStatus('❌ Verbindungsfehler: ' + e.message, true);
      }
    }

    // ── READ ─────────────────────────────────────────────────────────────────
    async function loadTasks() {
      const { data, error } = await db
        .from('tasks')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) { setStatus('❌ Fehler beim Laden: ' + error.message, true); return; }

      const list = document.getElementById('task-list');
      if (!data.length) {
        list.innerHTML = '<div class="empty-state">Noch keine Aufgaben. Füge deine erste hinzu!</div>';
        return;
      }

      const priorityLabel = { high: 'Hoch', medium: 'Mittel', low: 'Niedrig' };

      list.innerHTML = data.map(task => `
        <div class="task-item ${task.status === 'done' ? 'done' : ''} priority-${task.priority || 'medium'}" id="task-${task.id}">
          <input type="checkbox" class="task-checkbox"
            ${task.status === 'done' ? 'checked' : ''}
            onchange="toggleStatus('${task.id}', this.checked)" />
          <div class="task-body">
            <div class="task-title">${escHtml(task.title)}</div>
            ${task.description ? `<div class="task-desc">${escHtml(task.description)}</div>` : ''}
            <div class="task-meta">
              <span>${formatDate(task.created_at)}</span>
              <span class="badge ${task.status === 'done' ? 'badge-done' : 'badge-open'}">
                ${task.status === 'done' ? 'Erledigt' : 'Offen'}
              </span>
              <span class="badge badge-${task.priority || 'medium'}">
                ${priorityLabel[task.priority] || 'Mittel'}
              </span>
            </div>
          </div>
          <div class="task-actions">
            <button class="btn btn-ghost" onclick="openModal('${task.id}', \`${escAttr(task.title)}\`, \`${escAttr(task.description || '')}\`, '${task.priority || 'medium'}')">✏️</button>
            <button class="btn btn-danger" onclick="deleteTask('${task.id}')">🗑</button>
          </div>
        </div>
      `).join('');
    }

    // ── CREATE ────────────────────────────────────────────────────────────────
    async function createTask() {
      const title = document.getElementById('new-title').value.trim();
      const description = document.getElementById('new-desc').value.trim();
      const priority = document.getElementById('new-priority').value;
      if (!title) { alert('Bitte einen Titel eingeben.'); return; }

      const { error } = await db.from('tasks').insert([{ title, description, priority }]);
      if (error) { setStatus('❌ Fehler: ' + error.message, true); return; }

      document.getElementById('new-title').value = '';
      document.getElementById('new-desc').value = '';
      document.getElementById('new-priority').value = 'medium';
      await loadTasks();
    }

    // ── UPDATE (Status) ───────────────────────────────────────────────────────
    async function toggleStatus(id, checked) {
      const { error } = await db
        .from('tasks')
        .update({ status: checked ? 'done' : 'open' })
        .eq('id', id);

      if (error) { setStatus('❌ Fehler: ' + error.message, true); return; }
      await loadTasks();
    }

    // ── UPDATE (Edit Modal) ───────────────────────────────────────────────────
    function openModal(id, title, desc, priority) {
      editingId = id;
      document.getElementById('edit-title').value = title;
      document.getElementById('edit-desc').value = desc;
      document.getElementById('edit-priority').value = priority || 'medium';
      document.getElementById('edit-modal').classList.add('open');
    }

    function closeModal() {
      editingId = null;
      document.getElementById('edit-modal').classList.remove('open');
    }

    async function saveEdit() {
      const title = document.getElementById('edit-title').value.trim();
      const description = document.getElementById('edit-desc').value.trim();
      const priority = document.getElementById('edit-priority').value;
      if (!title) { alert('Titel darf nicht leer sein.'); return; }

      const { error } = await db
        .from('tasks')
        .update({ title, description, priority })
        .eq('id', editingId);

      if (error) { setStatus('❌ Fehler: ' + error.message, true); return; }
      closeModal();
      await loadTasks();
    }

    // ── DELETE ────────────────────────────────────────────────────────────────
    async function deleteTask(id) {
      if (!confirm('Aufgabe wirklich löschen?')) return;

      const { error } = await db.from('tasks').delete().eq('id', id);
      if (error) { setStatus('❌ Fehler: ' + error.message, true); return; }
      await loadTasks();
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function setStatus(msg, isError = false) {
      const el = document.getElementById('status-msg');
      el.textContent = msg;
      el.className = isError ? 'error' : '';
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escAttr(str) {
      return String(str).replace(/`/g, '\\`').replace(/\$/g, '\\$');
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleString('de-DE', { dateStyle: 'short', timeStyle: 'short' });
    }

    // Close modal on overlay click
    document.getElementById('edit-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // Enter key submits new task
    document.getElementById('new-title').addEventListener('keydown', e => {
      if (e.key === 'Enter') createTask();
    });

    init();
  </script>
</body>
</html>
